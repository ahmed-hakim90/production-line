name: Firestore Rules Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rules-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx firebase-tools emulators:exec --only firestore "npm run test:rules"
